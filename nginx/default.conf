# HTTPS server for code.dheerajjoshi.me (frontend proxy to Vercel)
server {
    listen 443 ssl;
    server_name code.dheerajjoshi.me;

    ssl_certificate /etc/letsencrypt/live/code.dheerajjoshi.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/code.dheerajjoshi.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass https://client-sepia-rho-74.vercel.app;
        proxy_http_version 1.1;
        proxy_set_header Host code.dheerajjoshi.me;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name client-sepia-rho-74.vercel.app;
    }
}

# Default fallback for unknown hosts (HTTP only)
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        return 444;
    }
}
