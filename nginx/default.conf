# HTTPS server for api.code.dheerajjoshi.me (CodeCast backend)
server {
    listen 443 ssl;
    server_name api.code.dheerajjoshi.me;

    ssl_certificate /etc/letsencrypt/live/api.code.dheerajjoshi.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.code.dheerajjoshi.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    location / {
        proxy_pass http://172.17.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

