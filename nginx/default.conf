upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

upstream minio_api {
    server minio:9000;
}

server_tokens off;

# HTTP -> HTTPS redirect for dheerajjoshi.me
server {
    listen 80;
    server_name dheerajjoshi.me;

    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for dheerajjoshi.me (kagaz app)
server {
    listen 443 ssl;
    server_name dheerajjoshi.me;

    ssl_certificate /etc/letsencrypt/live/dheerajjoshi.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dheerajjoshi.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    proxy_hide_header X-Powered-By;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /storage/ {
        rewrite ^/storage/(.*) /$1 break;
        proxy_pass http://minio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}

# HTTP -> HTTPS redirect for api.code.dheerajjoshi.me
server {
    listen 80;
    server_name api.code.dheerajjoshi.me;

    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
